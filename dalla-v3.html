'use strict';

// ══ API LAYER ══════════════════════════════════════════

// ← ضع رابط Render هنا بعد النشر
// مثال: const PRODUCTION_API_URL = "https://dalla-backend-o42o.onrender.com";
// إذا فعلت هذا وحفظت الملف، كل جهاز سيتصل بنفس السيرفر تلقائياً ✅
const PRODUCTION_API_URL = "https://dalla-backend-o42o.onrender.com";
// ══════════════════════════════════════════════════════════

const API_BASE = (()=>{
  // 1. الأولوية: قيمة مباشرة مضبوطة أعلاه
  if(PRODUCTION_API_URL) return PRODUCTION_API_URL.replace(/\/$/,"");
  // 2. إذا فُتح التطبيق عبر HTTP (من سيرفر) — استخدم نفس الأصل
  if(location.protocol==="https:" || (location.protocol==="http:" && location.hostname!=="localhost" && location.hostname!=="127.0.0.1"))
    return location.origin;
  // 3. تشغيل محلي على localhost — يتصل بالسيرفر المحلي
  return "http://localhost:4000";
})();

// تحذير مهم: إذا فُتح الملف بـ file:// أو كـ localhost
// البيانات لن تتزامن بين الأجهزة إلا إذا ضبطت PRODUCTION_API_URL
if(!PRODUCTION_API_URL && (location.protocol==="file:" || location.hostname==="localhost")){
  console.warn(
    "%c⚠️ دلّة: لمزامنة البيانات بين الأجهزة، اضبط PRODUCTION_API_URL في أعلى dalla-v3.html برابط Render الخاص بك",
    "color:orange;font-weight:bold;font-size:14px"
  );
}

let _apiOnline = null; // null = unknown yet, true/false after first check
let _authToken = localStorage.getItem('dalla_token') || null;
function setToken(t){ _authToken=t; if(t) localStorage.setItem('dalla_token',t); else localStorage.removeItem('dalla_token'); }
function getToken(){ return _authToken; }

async function api(method, path, body=null, requireAuth=true){
  try{
    const headers = { 'Content-Type':'application/json' };
    if(requireAuth && _authToken) headers['Authorization'] = 'Bearer '+_authToken;
    const opts = { method, headers };
    if(body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE+'/api'+path, {...opts, signal: AbortSignal.timeout(8000)});
    const data = await res.json();
    _apiOnline = true;
    if(!res.ok) throw new Error(data.error||'خطأ في السيرفر');
    return data;
  }catch(e){
    _apiOnline = false;
    console.warn('[API]', method, path, e.message);
    return null;
  }
}

async function checkApiHealth(){
  try{
    const res = await fetch(API_BASE+'/health', {signal: AbortSignal.timeout(5000)});
    const data = await res.json();
    _apiOnline = res.ok && data.db === 'connected';
    return _apiOnline;
  }catch{
    _apiOnline = false;
    return false;
  }
}

const {createElement:h,useState,useEffect,useLayoutEffect,useRef,useCallback,useMemo,createContext,useContext}=React;

// ══ STORE ENGINE ════════════════════════════════════════
function makeStore(init){
  let data=Array.isArray(init)?[...init]:{...init};
  const ls=[];
  function get(){return Array.isArray(init)?[...data]:{...data};}
  function set(v){data=v;ls.forEach(f=>f(get()));}
  function subscribe(fn){ls.push(fn);return()=>{const i=ls.indexOf(fn);if(i>-1)ls.splice(i,1);};}
  return{get,set,subscribe};
}
function makeHook(store){
  return function(){
    const[v,setV]=useState(store.get());
    useEffect(()=>store.subscribe(setV),[]);
    return v;
  };
}


// ══ CONSTANTS ══════════════════════════════════════════
const SUPPORT_WHATSAPP = "96812345678"; // رقم الدعم — يُغيَّر لاحقاً

// ══ باقات موحّدة: ١٥ كوب / ٣٠ كوب ══════════════════════
// السعر: أول شهر مخفّض ثم ينجدد تلقائياً
// avgCup = سعر الكوب العادي  wholesale = 0.7 × avgCup
// الشهر الأول مخفّض 20%، الشهر التالي سعر الجملة الكامل
function makePkgs(avgCup){
  const w=avgCup*0.7; // سعر الجملة لكل كوب
  const p15_1=Math.round(w*15*0.8*10)/10; // أول شهر
  const p15_r=Math.round(w*15*10)/10;       // تجديد
  const p30_1=Math.round(w*30*0.8*10)/10;
  const p30_r=Math.round(w*30*10)/10;
  return[
    {id:"pkg15",label:"١٥ كوب",cups:15,price1:p15_1,priceR:p15_r,
     desc:"أول شهر "+p15_1+" ر.ع ثم "+p15_r+" ر.ع / شهر",pop:false},
    {id:"pkg30",label:"٣٠ كوب",cups:30,price1:p30_1,priceR:p30_r,
     desc:"أول شهر "+p30_1+" ر.ع ثم "+p30_r+" ر.ع / شهر",pop:true},
  ];
}

let _cafesData=[];
// useCafes - wraps _cafesData array with reactivity, loads from server on first use
let _cafesStore=makeStore(_cafesData);
function useCafes(){
  const[v,setV]=useState(_cafesStore.get());
  useEffect(()=>{
    ensureCafesLoaded();
    return _cafesStore.subscribe(setV);
  },[]);
  return v;
}

// ── مزامنة الكوفيهات مع السيرفر الحقيقي ──────────────────
// ══ API CONCURRENCY LOCKS ═══════════════════════════
const _loadLocks = {};
async function withLock(key, fn) {
  if (_loadLocks[key]) return; // already running
  _loadLocks[key] = true;
  try { await fn(); } finally { _loadLocks[key] = false; }
}

async function loadCafesFromServer(){
  await withLock('loadCafesFromServer', async()=>{
    const r = await api("GET","/cafes",null,false);
  if(r && Array.isArray(r.cafes)){
    _cafesData = r.cafes;
    _cafesStore.set([..._cafesData]);
  }
  });
}
// يُحمَّل عند فتح أي شاشة تستخدم الكوفيهات (انظر useCafes أدناه)
let _cafesLoadedOnce=false;
function ensureCafesLoaded(){
  if(_cafesLoadedOnce) return;
  _cafesLoadedOnce=true;
  loadCafesFromServer();
  loadCodesFromServer();   // أكواد الهدية والخصم
  loadOffersFromServer();  // العروض النشطة
}

async function updateCafe(id,updates){
  // تحديث متفائل فوري بالواجهة
  const i=_cafesData.findIndex(c=>c.id===id);
  if(i>-1){_cafesData[i]={..._cafesData[i],...updates};if(updates.avgCup)_cafesData[i].pkgs=makePkgs(updates.avgCup);_cafesStore.set([..._cafesData]);}
  // إرسال فعلي للسيرفر
  const r = await api("PATCH","/cafes/"+id,updates);
  if(r && r.cafe){
    const idx=_cafesData.findIndex(c=>c.id===id);
    if(idx>-1){_cafesData[idx]=r.cafe;_cafesStore.set([..._cafesData]);}
  }
}
async function addCafe(c){
  const r = await api("POST","/cafes",{
    slug:c.id, nameAr:c.nameAr, area:c.area, color:c.color, logo:c.logo,
    avgCup:c.avgCup, lat:c.lat, lng:c.lng, featured:c.featured
  });
  if(r && r.cafe){
    _cafesData.push(r.cafe);
  }else{
    // وضع عدم الاتصال: أضف محلياً فقط (لن يظهر عند المستخدمين الآخرين)
    _cafesData.push({...c,pkgs:makePkgs(c.avgCup||1.5)});
  }
  _cafesStore.set([..._cafesData]);
}
async function addMenuItem(cafeId,item){
  const r = await api("POST","/cafes/"+cafeId+"/menu",item);
  if(r && r.item){
    const cafe=_cafesData.find(c=>c.id===cafeId);
    if(cafe){
      cafe.menu=[...cafe.menu,{id:r.item.id,name:r.item.name,sizes:r.item.sizes,price:parseFloat(r.item.price)}];
      _cafesStore.set([..._cafesData]);
    }
    return true;
  }
  return false;
}
async function removeMenuItem(cafeId,itemId){
  const r = await api("DELETE","/cafes/"+cafeId+"/menu/"+itemId);
  if(r){
    const cafe=_cafesData.find(c=>c.id===cafeId);
    if(cafe){
      cafe.menu=cafe.menu.filter(m=>m.id!==itemId);
      _cafesStore.set([..._cafesData]);
    }
    return true;
  }
  return false;
}

// ══ NOTIFICATIONS STORE ═══════════════════════════════════
const _notifs=makeStore([]);
function addNotif(msg,type="info",data=null){
  const n={id:Date.now()+(Math.random()*999|0),msg,type,time:new Date(),data,read:false};
  const arr=[n,..._notifs.get()].slice(0,40);
  _notifs.set(arr);

  if(type!=="info"&&window.Notification&&Notification.permission==="granted"){

  }
  return n.id;
}
function markNotifsRead(){_notifs.set(_notifs.get().map(n=>({...n,read:true})));}
function useNotifs(){
  const[notifs,setNotifs]=useState(_notifs.get());
  useEffect(()=>_notifs.subscribe(setNotifs),[]);
  const unread=notifs.filter(n=>!n.read).length;
  return{notifs,unread,markNotifsRead,addNotif};
}
const notifList={get:()=>_notifs.get()};

// ══ ICON COMPONENT (renders Lucide SVGs inline — no MutationObserver needed) ══
function Icon({name,size=20,color,style}){
  const ref=useRef(null);
  const iconKey=name&&name.replace?name.replace(/-([a-z])/g,(_,c)=>c.toUpperCase()):"";
  const Key=iconKey?iconKey[0].toUpperCase()+iconKey.slice(1):"";
  useLayoutEffect(()=>{
    const el=ref.current;
    if(!el||!window.lucide)return;
    const iconData=window.lucide[Key];
    if(!iconData||!Array.isArray(iconData))return;
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('xmlns','http://www.w3.org/2000/svg');
    svg.setAttribute('width',size);
    svg.setAttribute('height',size);
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');
    svg.setAttribute('stroke-width','2');
    svg.setAttribute('stroke-linecap','round');
    svg.setAttribute('stroke-linejoin','round');
    if(color)svg.style.color=color;
    if(style)Object.assign(svg.style,style);
    iconData.forEach(([tag,attrs])=>{
      const child=document.createElementNS('http://www.w3.org/2000/svg',tag);
      if(attrs)Object.entries(attrs).forEach(([k,v])=>child.setAttribute(k,v));
      svg.appendChild(child);
    });
    el.innerHTML='';
    el.appendChild(svg);
  },[name,size,color]);
  return h('span',{ref,style:{display:'inline-flex',lineHeight:0,flexShrink:0,alignItems:'center'}});
}

  });

    _gifts.set(_gifts.get().map(lg=>lg.id===gift.id?{...lg,serverId:r.gift.id}:lg));
    // إشعار للمستلم عبر السيرفر (cross-device)

      :"🎁 تم إهداؤك كوب قهوة في "+(g.cafe||"");
    await addUserNotif(g.toPhone, notifMsg, "gift", {giftId:r.gift.id});
  }

}



// ══ SUBSCRIPTIONS STORE (multi-subscription support) ═════
// username → array of subscription objects [{id,cafeId,cafeName,pkg,cups,totalCups,startDate,...}]
const _subs=makeStore({});
let subSeq=1;
function addSub(username,sub){
  const all=_subs.get();
  const list=all[username]||[];
  const withId={...sub,id:sub.id||("sub"+subSeq++),username,active:true};
  _subs.set({...all,[username]:[...list,withId]});
  return withId;
}
function setSub(username,sub){
  // backward-compat: replace/insert single subscription (used by legacy callers)
  addSub(username,sub);
}


function getSubs(username){return _subs.get()[username]||[];}
function getActiveSubs(username){return getSubs(username).filter(s=>s.active!==false&&s.cups>0);}

async function addDiscountCode(code,pct,uses,exp,type,isGift,giftPhone){
  // أضف فوراً محلياً (optimistic UI)
  const k=code.toUpperCase().trim();
  const all=_codes.get();
  _codes.set({...all,[k]:{pct:parseInt(pct)||0,uses:parseInt(uses)||0,used:0,active:true,
    exp:exp||null,type:type||"both",isGift:!!isGift,giftPhone:giftPhone||null}});
  // أرسل للسيرفر
  const r=await api("POST","/codes",{code:k,pct,uses:uses||0,exp:exp||null,
    applyTo:type||"both",isGift:!!isGift,giftPhone:giftPhone||null});
  if(!r) console.warn("[sync] فشل حفظ الكود على السيرفر — محفوظ محلياً مؤقتاً");
  else await loadCodesFromServer(); // حدّث من السيرفر لضمان التطابق
}

async function toggleCode(code,active){
  const k=code.toUpperCase().trim();
  const all=_codes.get();
  if(all[k])_codes.set({...all,[k]:{...all[k],active}});
  await api("PATCH","/codes/"+k+"/toggle",null);
  await loadCodesFromServer();
}

function validateCode(code){
  const k=code?.toUpperCase()?.trim();
  const c=_codes.get()[k];
  if(!c||!c.active)return{ok:false,msg:"الكود غير صحيح أو غير نشط"};
  if(c.uses>0&&c.used>=c.uses)return{ok:false,msg:"انتهى عدد استخدامات هذا الكود"};
  if(c.exp&&new Date(c.exp)<new Date())return{ok:false,msg:"انتهت صلاحية الكود"};
  return{ok:true,pct:c.pct,isGift:c.isGift,giftPhone:c.giftPhone,
    msg:c.isGift?"كود هدية صالح ☕":"خصم "+c.pct+"%"};
}

async function useCode(code){
  const k=code?.toUpperCase()?.trim();
  const all=_codes.get();
  if(all[k])_codes.set({...all,[k]:{...all[k],used:(all[k].used||0)+1}});
  await api("POST","/codes/use",{code:k});
}

// ══ SECURE QR CODE ENGINE ═══════════════════════════════════
// Rotating, signed tokens — changes every render to prevent screenshot replay.
// Format: DALLA.<payloadBase64>.<signature>
let _qrSalt=Math.random().toString(36).slice(2);
function _qrSign(payload){
  // lightweight rotating hash (demo-grade signature, not cryptographic)
  let h=0;
  const s=payload+_qrSalt+todayStr();
  for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}
  return Math.abs(h).toString(36);
}
function generateSecureQR(identity){
  // identity: username/phone or gift code
  const nonce=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const payload=btoa(unescape(encodeURIComponent(identity+"|"+nonce))).replace(/=+$/,"");
  const sig=_qrSign(payload);
  return "DALLA."+payload+"."+sig;
}
function verifySecureQR(token){
  try{
    const parts=String(token).split(".");
    if(parts.length!==3||parts[0]!=="DALLA")return{valid:false,reason:"تنسيق غير صحيح"};
    const[,payload,sig]=parts;
    const expected=_qrSign(payload);
    if(sig!==expected)return{valid:false,reason:"الرمز غير صالح أو منتهي (أعد المسح)"};
    const decoded=decodeURIComponent(escape(atob(payload)));
    const identity=decoded.split("|")[0];
    return{valid:true,identity};
  }catch(e){return{valid:false,reason:"تعذّر قراءة الرمز"};}
}
// Rotate salt periodically so old screenshots of the QR stop working
setInterval(()=>{_qrSalt=Math.random().toString(36).slice(2);},45000);

// ══ PULL-TO-REFRESH HOOK ═══════════════════════════════════
// Professional pull-down: whole page translates down while a spinner shows.
// No notification is sent to the user — purely visual.
function usePullToRefresh(onRefresh){
  const startY=useRef(0);const pulling=useRef(false);
  const[refreshing,setRefreshing]=useState(false);
  const[pullY,setPullY]=useState(0);
  const onTouchStart=e=>{
    // فقط ابدأ الـ pull-to-refresh لو المستخدم في أعلى الصفحة تماماً
    if(window.scrollY===0&&e.touches[0].clientY<80){
      startY.current=e.touches[0].clientY;
      pulling.current=true;
    }else{
      pulling.current=false;
    }
  };
  const onTouchMove=e=>{
    if(!pulling.current)return;
    const dy=e.touches[0].clientY-startY.current;
    if(dy>0&&window.scrollY===0){
      // لا تمنع الـ scroll الطبيعي — فقط تحريك بصري للمؤشر
      setPullY(Math.min(dy*0.4,60));
    }else{
      pulling.current=false;
      setPullY(0);
    }
  };
  const onTouchEnd=()=>{
    if(!pulling.current)return;
    pulling.current=false;
    if(pullY>45){
      setRefreshing(true);
      setPullY(60);
      setTimeout(()=>{
        if(onRefresh)onRefresh();
        setRefreshing(false);
        setPullY(0);
      },800);
    }else{
      setPullY(0);
    }
  };
  return{refreshing,pullY,handlers:{onTouchStart,onTouchMove,onTouchEnd}};
}

// ══ QR CODE (CSS grid visual) ══════════════════════════
function QRDisplay({value,size=160,countdown=null}){
  const hash=value.split("").reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0)|0,0);
  const n=9;
  const cells=Array.from({length:n*n},(_,i)=>{
    const r=Math.floor(i/n),c=i%n;
    if((r<2&&c<2)||(r<2&&c>n-3)||(r>n-3&&c<2))return true;
    return((hash^(r*17+c*11+(r*c)))&1)===1;
  });
  const cs=Math.floor(size/n);
  const pct=countdown!=null?Math.round((countdown/30)*100):100;
  const circ=69.1; // 2π×11 ≈ dasharray
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8}},
    h("div",{style:{position:"relative",padding:8,background:"#F5EEE2",borderRadius:12,border:"2px solid #ECE3D3"}},
      h("div",{style:{display:"grid",gridTemplateColumns:`repeat(${n},${cs}px)`,gap:1}},
        ...cells.map((on,i)=>h("div",{key:i,style:{width:cs,height:cs,background:on?"#241C14":"transparent",borderRadius:on?2:0}}))
      ),
      countdown!=null&&h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}},
        h("svg",{width:50,height:50,style:{opacity:.85}},
          h("circle",{cx:25,cy:25,r:22,fill:"none",stroke:"#ECE3D3",strokeWidth:3}),
          h("circle",{cx:25,cy:25,r:22,fill:"none",stroke:pct>40?"#4A7C5F":"#B85C3A",strokeWidth:3,
            strokeDasharray:"138.2",strokeDashoffset:138.2*(1-pct/100),
            strokeLinecap:"round",transform:"rotate(-90 25 25)",transition:"stroke-dashoffset .5s,stroke .5s"}),
          h("text",{x:25,y:30,textAnchor:"middle",fontSize:14,fontWeight:700,fill:"#241C14"},countdown)
        )
      )
    )
  );
}

// ══ SIMPLE SVG CHART ══════════════════════════════════
function LineChart({data}){
  if(!data||!data.length)return null;
  const W=300,H=140,P=30;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=data.map((d,i)=>({x:P+(i/(data.length-1||1))*(W-P*2),y:P+(1-(d.v-mn)/rng)*(H-P*2),d}));
  const path=pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
  const fill=path+" L"+pts[pts.length-1].x+","+(H-P)+" L"+pts[0].x+","+(H-P)+" Z";
  return h("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height:H}},
    ...[0,1,2].map(i=>h("line",{key:i,x1:P,y1:P+i*(H-P*2)/2,x2:W-P,y2:P+i*(H-P*2)/2,stroke:"#ECE3D3",strokeWidth:1})),
    h("path",{d:fill,fill:"#C2603F15"}),
    h("path",{d:path,fill:"none",stroke:"#C2603F",strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"}),
    ...pts.map((p,i)=>h("g",{key:i},
      h("circle",{cx:p.x,cy:p.y,r:3.5,fill:"#C2603F",stroke:"#F5EEE2",strokeWidth:2}),
      h("text",{x:p.x,y:H-8,textAnchor:"middle",fontSize:9,fill:"#93826B"},p.d.month?.slice(0,3)||"")
    ))
  );
}

function QRSheet({onClose,username,gift,subscription,subscriptionsList,onSubscribe,onPickSub}){
  const[timer,setTimer]=useState(30);
  const[qrSeed,setQrSeed]=useState(0);
  const[codeInput,setCodeInput]=useState("");
  const[codeResult,setCodeResult]=useState(null);
  const[showCodeInput,setShowCodeInput]=useState(false);
  const lang=useLang();
  const subs=subscriptionsList||[];
  const sub=subscription||null;
  const cafe=sub?_cafesData.find(c=>c.id===sub.cafeId):null;
  const isMultiSub=!gift&&subs.length>1&&!sub&&!codeResult?.ok;

  // 30s countdown — sheet closes at 0
  useEffect(()=>{
    if(!sub||gift||isMultiSub||codeResult?.ok)return;
    if(timer<=0){onClose();return;}
    const t=setTimeout(()=>setTimer(tt=>tt-1),1000);
    return()=>clearTimeout(t);
  },[timer,sub,gift,isMultiSub,codeResult]);

  // QR changes every 30s (qrSeed), NOT every second
  const identity=gift?("GIFT-"+gift.id):(codeResult?.ok&&codeResult.isGift?codeResult.code:username);
  const qrValue=useMemo(()=>generateSecureQR(identity),[identity,qrSeed]);

  const applyCode=async()=>{
    const k=codeInput.trim().toUpperCase();
    if(!k){setCodeResult({ok:false,msg:"أدخل الكود"});return;}
    // أرسل رقم الزبون للتحقق من ملكية كود الهدية
    const serverResult=await api("POST","/codes/validate",{code:k,requesterPhone:username},false);
    if(serverResult){
      if(serverResult.ok&&serverResult.isGift){
        const all=_codes.get();
        _codes.set({...all,[k]:{pct:100,uses:1,used:0,active:true,isGift:true}});
        setCodeResult({ok:true,isGift:true,code:k,msg:"✅ الكود صالح — اعرضه للباريستا"});
      }else if(serverResult.ok){
        setCodeResult({ok:false,msg:"هذا كود خصم، استخدمه عند الاشتراك وليس هنا"});
      }else{
        setCodeResult({ok:false,msg:serverResult.msg||"الكود غير صحيح"});
      }
      return;
    }
    const r=validateCode(k);
    if(r.ok&&r.isGift){setCodeResult({ok:true,isGift:true,code:k,msg:"✅ الكود صالح — اعرضه للباريستا"});}
    else if(r.ok){setCodeResult({ok:false,msg:"هذا كود خصم، استخدمه عند الاشتراك وليس هنا"});}
    else{setCodeResult({ok:false,msg:r.msg});}
  };

  const codeEntryBox=!gift&&!codeResult?.ok&&h("div",{style:{marginTop:14,paddingTop:14,borderTop:"1px solid #ECE3D3"}},
    !showCodeInput
      ?h("button",{onClick:()=>setShowCodeInput(true),
          style:{width:"100%",padding:"10px",borderRadius:12,background:"#F5F1E8",
            border:"1px solid #ECE3D3",fontSize:12,color:"#5b5142",fontWeight:700,
            display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
          t("enter_code"))
      :h("div",null,
          h("p",{style:{fontSize:11,fontWeight:700,color:"#241C14",marginBottom:7}},t("enter_code")),
          h("div",{style:{display:"flex",gap:7}},
            h("input",{value:codeInput,onChange:e=>setCodeInput(e.target.value.toUpperCase()),
              placeholder:"مثال: GIFT-ABC123",dir:"ltr",autoFocus:true,
              style:{flex:1,padding:"10px 12px",borderRadius:10,
                border:"1.5px solid "+(codeResult?.ok===false?"#B85C3A":"#ECE3D3"),
                background:"#F5EEE2",fontSize:13,color:"#241C14",outline:"none"},
              onKeyDown:e=>e.key==="Enter"&&applyCode()}),
            h("button",{onClick:applyCode,
              style:{padding:"10px 14px",borderRadius:10,fontWeight:700,fontSize:12,
                background:"linear-gradient(135deg,#C2603F,#D2785A)",color:"#F5EEE2"}},
              t("check"))
          ),
          codeResult&&h("p",{style:{fontSize:11,marginTop:5,fontWeight:700,
            color:codeResult.ok?"#4A7C5F":"#B85C3A"}},codeResult.msg),
          h("button",{onClick:()=>{setShowCodeInput(false);setCodeResult(null);setCodeInput("");},
            style:{fontSize:11,color:"#93826B",background:"none",marginTop:5}},t("cancel"))
        )
  );

  const waHelp=h("div",{style:{marginTop:14,paddingTop:14,borderTop:"1px solid #ECE3D3",textAlign:"center"}},
    h("p",{style:{fontSize:12,color:"#93826B",marginBottom:6}},t("need_help")),
    h("a",{href:"https://wa.me/"+SUPPORT_WHATSAPP,target:"_blank",
      style:{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 16px",
        borderRadius:10,background:"#25D366",color:"#F5EEE2",fontSize:11,fontWeight:700,
        textDecoration:"none"}},"💬 "+t("whatsapp_help"))
  );

  return h("div",{className:"overlay",onClick:onClose},
    h("div",{className:"sheet",style:{padding:20},onClick:e=>e.stopPropagation()},

      // Code redeemed — show QR
      codeResult?.ok&&h("div",{style:{textAlign:"center"}},
        h("p",{style:{fontWeight:700,fontSize:14,color:"#4A7C5F",marginBottom:4}},"🎁 "+t("redeem_qr_title")),
        h("p",{style:{fontSize:11,color:"#93826B",marginBottom:12}},t("show_to_barista")),
        h(QRDisplay,{value:qrValue,countdown:null}),
        h("p",{style:{fontSize:10,color:"#93826B",marginTop:6,direction:"ltr",letterSpacing:1}},codeResult.code),
        h("button",{onClick:()=>{setCodeResult(null);setCodeInput("");setShowCodeInput(false);},
          style:{marginTop:10,padding:"6px 16px",borderRadius:10,background:"#ECE3D3",color:"#93826B",fontSize:12}},
          "← "+t("back"))
      ),

      // Multi-sub picker
      isMultiSub&&h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontSize:36,marginBottom:8}},"📦"),
        h("p",{style:{fontWeight:700,fontSize:15,color:"#241C14",marginBottom:4}},t("which_sub")),
        h("p",{style:{fontSize:12,color:"#93826B",marginBottom:14}},t("multi_sub_hint")),
        h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          ...subs.map(s=>{
            const c=_cafesData.find(cc=>cc.id===s.cafeId);
            return h("button",{key:s.id,onClick:()=>onPickSub&&onPickSub(s),
              style:{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",
                borderRadius:14,background:"#FFFDF9",border:"1.5px solid "+(c?c.color:"#ECE3D3"),
                textAlign:"start"}},
              c&&h(CafeLogo,{cafe:c,size:36}),
              h("div",{style:{flex:1}},
                h("p",{style:{fontWeight:700,fontSize:13,color:"#241C14"}},(c?c.nameAr:s.cafeName)+" · "+s.pkg),
                h("p",{style:{fontSize:11,color:c?c.color:"#C2603F",fontWeight:700}},s.cups+" "+t("cups_remaining"))
              ),
              h("span",{style:{color:"#93826B",fontSize:16}},"›")
            );
          })
        ),
        codeEntryBox
      ),

      // Cup gift QR
      gift&&gift.type==="cup"&&h("div",{style:{textAlign:"center"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
          background:"linear-gradient(135deg,#C2603F15,#D2785A08)",
          border:"1px solid #C2603F33",borderRadius:14,marginBottom:12,textAlign:"start"}},
          h("span",{style:{fontSize:26}},"🎁"),
          h("div",{style:{flex:1}},
            h("p",{style:{fontWeight:700,fontSize:13,color:"#241C14"}},gift.cafe||""),
            h("p",{style:{fontSize:11,color:"#C2603F",fontWeight:700}},(gift.drink||t("gift_cup"))+(gift.size?" ("+gift.size+")":""))
          )
        ),
        h("p",{style:{fontWeight:700,fontSize:14,color:"#241C14",marginBottom:4}},t("gift_qr_title")),
        h("p",{style:{fontSize:11,color:"#93826B",marginBottom:12}},t("show_to_barista")),
        h(QRDisplay,{value:qrValue,countdown:timer}),
        h("p",{style:{fontSize:11,color:timer>10?"#4A7C5F":"#B85C3A",marginTop:8,fontWeight:700}},
          timer>0?"يتجدد الرمز خلال "+timer+" ثانية":"يتجدد الرمز..."),
        waHelp
      ),

      // Subscription gift — activate
      gift&&gift.type==="pkg"&&gift.status==="pending"&&h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontSize:44,marginBottom:8}},"🎁"),
        h("p",{style:{fontWeight:700,fontSize:15,color:"#241C14",marginBottom:4}},lang==="ar"?"هدية اشتراك بانتظارك!":"A subscription gift awaits you!"),
        h("p",{style:{fontSize:12,color:"#93826B",marginBottom:4}},(gift.cafe||"")+" · "+(gift.pkg||"")),
        h("p",{style:{fontSize:11,color:"#B85C3A",marginBottom:16}},
          t("expires_in_days",Math.max(0,Math.ceil((new Date(gift.expiresAt)-new Date())/86400000)))+(lang==="ar"?" — فعّلها الآن":" — activate now")),
        h("button",{onClick:()=>{if(onSubscribe)onSubscribe(gift);},
          style:{width:"100%",padding:14,borderRadius:14,fontWeight:700,fontSize:14,
            background:"linear-gradient(135deg,#4A7C5F,#6FA882)",color:"#F5EEE2"}},
          t("activate_sub"))
      ),

      // Not subscribed — show subscribe CTA + code entry
      !sub&&!gift&&!isMultiSub&&!codeResult?.ok&&h("div",{style:{textAlign:"center",paddingBottom:8}},
        h("div",{style:{fontSize:44,marginBottom:8}},"☕"),
        h("p",{style:{fontWeight:700,fontSize:15,color:"#241C14",marginBottom:4}},t("new_order")),
        h("p",{style:{fontSize:12,color:"#93826B",marginBottom:16,lineHeight:1.6}},t("subscribe_or_code")),
        h("button",{onClick:()=>{if(onSubscribe)onSubscribe();else onClose();},
          style:{width:"100%",padding:13,borderRadius:14,fontWeight:700,fontSize:13,
            background:"linear-gradient(135deg,#C2603F,#D2785A)",color:"#F5EEE2",marginBottom:8}},
          t("subscribe_now")+" 📦"),

    h("button",{onClick:handleSubscribe,disabled:busy,

function BaristaApp(){
  const{username,handleLogout,staffCafeId}=useApp();
  const cafes=useCafes();
  const cafe=cafes.find(c=>c.id===staffCafeId)||cafes[0];
  const[bTab,setBTab]=useState("orders");
  const[filter,setFilter]=useState("pending");
  const[scanCode,setScanCode]=useState("");
  const[scanPhase,setScanPhase]=useState("input");
  const[scanUser,setScanUser]=useState(null);
  const[selectedDrink,setSelectedDrink]=useState(null);
  const[selectedSize,setSelectedSize]=useState("وسط");
  const[toast,setToast]=useState({show:false,msg:""});
  const showToast=(msg,dur=2200)=>{setToast({show:true,msg});setTimeout(()=>setToast({show:false,msg:""}),dur);};
  const{notifs,unread:unreadCount,markNotifsRead}=useNotifs();
  const[notifOpen,setNotifOpen]=useState(false);
  const allOrders=useOrders();
  const cafeOrders=allOrders.filter(o=>!staffCafeId||o.cafeId===staffCafeId||o.cafeName===cafe?.nameAr);
  const activeOrds=cafeOrders.filter(o=>o.status==="pending"||o.status==="preparing"||o.status==="ready");
  const readyOrds=cafeOrders.filter(o=>o.status==="ready");
  const{refreshing,pullY,handlers}=usePullToRefresh(async()=>{
    await loadOrdersFromServer();
    if(window.lucide)window.lucide.createIcons();
  });

  const filteredOrders=cafeOrders.filter(o=>{
    if(filter==="pending")return o.status==="pending";
    if(filter==="ready")return o.status==="ready";
    if(filter==="done")return o.status==="completed";
    return true;
  });

  const cntPending=cafeOrders.filter(o=>o.status==="pending").length;
  const cntReady=cafeOrders.filter(o=>o.status==="ready").length;
  const cntDone=cafeOrders.filter(o=>o.status==="completed").length;

  const advanceOrder=async(order)=>{
    const next=order.status==="pending"?"preparing":order.status==="preparing"?"ready":"completed";
    updateOrder(order.id,next);
    try{await api("PUT","/orders/"+order.id+"/status",{status:next});}catch(e){}
    showToast(next==="ready"?"الطلب جاهز ✓":next==="completed"?"تم الاستلام ✓":"جارٍ التحضير...");
    if(window.lucide)window.lucide.createIcons();
  };

  const resetScan=()=>{setScanCode("");setScanPhase("input");setScanUser(null);setSelectedDrink(null);};

  const verifyScan=async()=>{
    if(!scanCode.trim())return;
    setScanPhase("verifying");
    try{
      const r=await api("POST","/orders/verify-qr",{code:scanCode.trim()});
      if(r&&r.valid){
        setScanUser(r);setScanPhase("verified");
        showToast("تم التحقق ✓");
      }else{
        setScanPhase("input");showToast("رمز غير صحيح");
      }
    }catch(e){setScanPhase("input");showToast("خطأ في التحقق");}
    if(window.lucide)window.lucide.createIcons();
  };

  const submitScanOrder=async()=>{
    if(!scanUser||!selectedDrink)return;
    const drink=selectedDrink;
    showToast("جارٍ إرسال الطلب...");
    try{
      await api("POST","/orders",{customerPhone:scanUser.phone||"",drink:drink,size:selectedSize,cafeId:staffCafeId||cafe?.id,status:"pending"});
      showToast("تم إرسال الطلب ✓");
      resetScan();
    }catch(e){showToast("حدث خطأ");}
  };

  useEffect(()=>{loadOrdersFromServer();},[]);
  

  const chipStyle=(active)=>({
    padding:"6px 14px",borderRadius:50,fontSize:12,fontWeight:700,
    background:active?"#241C14":"#FFFDF9",
    color:active?"#fff":"#93826B",
    border:active?"none":"1px solid #ECE3D3"
  });

  const menu=cafe?.menu||[
    {name:"لاتيه"},{name:"كابتشينو"},{name:"موكا"},{name:"أمريكانو"},{name:"إسبريسو"},{name:"فلات وايت"}
  ];

        ),

      // QR viewfinder
      h("div",{style:{marginTop:18,aspectRatio:1,borderRadius:24,background:"#241C14",position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}},
        h("div",{style:{position:"absolute",inset:42,border:"2px dashed rgba(255,255,255,.25)",borderRadius:18}}),

      h("div",{style:{marginTop:18,display:"flex",alignItems:"center",gap:8}},

        h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}},
          menu.map(item=>h("button",{key:item.name,onClick:()=>setSelectedDrink(item.name),
            style:{padding:"8px 14px",borderRadius:50,fontSize:12,fontWeight:700,
              background:selectedDrink===item.name?"#241C14":"#FFFDF9",
              color:selectedDrink===item.name?"#fff":"#93826B",
              border:selectedDrink===item.name?"none":"1px solid #ECE3D3"}},
            item.name))
        ),
        selectedDrink&&h("button",{onClick:submitScanOrder,
          style:{marginTop:16,background:"#C2603F",color:"#fff",fontSize:14,fontWeight:700,textAlign:"center",padding:13,borderRadius:13,width:"100%"}},

      )
    );
  }

  return h("div",{style:{minHeight:"100vh",background:"#F5EEE2",maxWidth:430,margin:"0 auto",position:"relative",overflowX:"hidden"}},
    h(Toast,{msg:toast.msg,show:toast.show}),

    bTab==="orders"?renderOrders():renderScan(),

    // ── Bottom Nav ──
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(250,248,243,.96)",backdropFilter:"blur(12px)",borderTop:"1px solid #ECE3D3",padding:"10px 30px 22px",display:"flex",justifyContent:"space-around",zIndex:50}},
      h("button",{onClick:()=>{setBTab("orders");resetScan();},style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:bTab==="orders"?"#C2603F":"#93826B",background:"none"}},
        h(Icon,{name:"clipboard-list",size:21}),h("span",{style:{fontSize:10,fontWeight:700}},"الطلبات")),
      h("button",{onClick:()=>setBTab("scan"),style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:bTab==="scan"?"#C2603F":"#93826B",background:"none"}},
        h(Icon,{name:"scan-line",size:21}),h("span",{style:{fontSize:10,fontWeight:700}},"مسح QR"))
    )
  );
}

    Promise.all([loadOrdersFromServer(),loadComplaintsFromServer(),loadSubsFromServer()]);

        h("div",{style:{display:"flex",gap:8,marginTop:12}},

        )
      ),

      // Tab content
      tab==="overview"?renderOverview():

    // ── Bottom Nav ──
    h("div",{style:{position:"absolute",bottom:0,left:0,right:0,background:"rgba(250,248,243,.96)",backdropFilter:"blur(12px)",borderTop:"1px solid #ECE3D3",padding:"10px 18px 22px",display:"flex",justifyContent:"space-around",zIndex:50}},
      ...nav.map(n=>h("button",{key:n.id,onClick:()=>setTab(n.id),
        style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:tab===n.id?"#C2603F":"#93826B",background:"none"}},
        h(Icon,{name:n.icon,size:20}),
        h("span",{style:{fontSize:10,fontWeight:700}},n.label)
      ))
    )
  );
}

// ══ ROOT ═══════════════════════════════════════════════
function Root(){
  const[role,setRole]=useState(null);
  const[username,setUsername]=useState("");
  const[staffCafeId,setStaffCafeId]=useState(null);
  const[checking,setChecking]=useState(true); // يتحقق من الـ token المحفوظ عند الفتح

  const handleLogin=(r,u,cafeId=null,tok=null)=>{if(tok)setToken(tok);setRole(r);setUsername(u||"زائر");setStaffCafeId(cafeId);};
  const handleLogout=()=>{setToken(null);setRole(null);setUsername("");setStaffCafeId(null);};
  const ctx={username,handleLogout,staffCafeId};

  // ── Auto-login: تحقق من الـ token المحفوظ عند كل فتح للتطبيق ──
  useEffect(()=>{
    const savedToken=getToken();
    if(!savedToken){setChecking(false);return;}
    // إذا السيرفر بطيء (cold start)، لا ننتظر أكثر من 6 ثوانٍ
    // وبدلاً من ذلك نُحلّل الـ token محلياً ونُدخّل المستخدم مباشرة
    const fallbackTimer=setTimeout(()=>{
      try{
        // حلّل الـ token محلياً (mock token: "mock.base64")
        const parts=savedToken.split(".");
        if(parts.length>=2){
          const payload=JSON.parse(atob(parts[1]));
          const roleMap={CUSTOMER:"customer",STAFF:"barista",MANAGER:"manager",ADMIN:"admin"};
          setRole(roleMap[payload.role]||"customer");
          setUsername(payload.name||payload.phone||"مستخدم");
          setStaffCafeId(payload.shopId||null);
        }
      }catch(e){}
      setChecking(false);
    },6000);
    // تحقق من السيرفر أن الجلسة لا تزال صالحة
    api("GET","/auth/me",null,true).then(r=>{
      clearTimeout(fallbackTimer);
      if(r&&r.user){
        const u=r.user;
        const roleMap={CUSTOMER:"customer",STAFF:"barista",MANAGER:"manager",ADMIN:"admin"};
        setRole(roleMap[u.role]||"customer");
        setUsername(u.name||u.phone||"مستخدم");
        setStaffCafeId(u.shopId||null);
        api("POST","/auth/refresh",null,true).then(ref=>{
          if(ref&&ref.token)setToken(ref.token);
        });
      }else{
        setToken(null);
      }
      setChecking(false);
    }).catch(()=>{clearTimeout(fallbackTimer);setChecking(false);});
  },[]);

  // شاشة تحميل أثناء التحقق من الجلسة
  if(checking)return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#F5EEE2,#ECE3D3)"}},
    h("div",{style:{textAlign:"center",padding:"0 32px"}},
      h("div",{style:{fontSize:52,marginBottom:10}},"☕"),
      h("div",{style:{fontFamily:"var(--font-display)",fontSize:24,fontWeight:700,color:"#241C14"}},"دلّة"),
      h("div",{style:{fontSize:13,color:"#93826B",marginTop:10,lineHeight:1.6}},
        "جارٍ الاتصال بالسيرفر..."),
      h("div",{style:{marginTop:16,width:48,height:4,borderRadius:4,background:"#ECE3D3",overflow:"hidden",margin:"16px auto 0"}},
        h("div",{style:{height:"100%",background:"#C2603F",borderRadius:4,animation:"slideBar 1.4s ease-in-out infinite"}}))
    )
  );

  return h(Ctx.Provider,{value:ctx},
    !role?h(Gateway,{onLogin:handleLogin}):
    role==="customer"?h(CustomerApp,null):
    role==="barista"?h(BaristaApp,null):
    role==="manager"?h(ManagerApp,null):
    h(AdminApp,null)
  );
}

// Error boundary - shows error instead of blank screen
window.addEventListener('error',function(e){
  var r=document.getElementById('root');
  if(r)r.innerHTML='<div style="padding:24px;font-family:Arial;direction:rtl;max-width:430px;margin:0 auto;text-align:center"><div style="font-size:40px;margin-bottom:12px">⚠️</div><p style="font-weight:700;font-size:16px;color:#B85C3A;margin-bottom:8px">خطأ في التطبيق</p><pre style="font-size:11px;color:#666;direction:ltr;word-break:break-all;white-space:pre-wrap;text-align:start;background:#f5f5f5;padding:10px;border-radius:8px">'+(e.message||'?')+'\n'+(e.filename||'')+':'+(e.lineno||'')+'</pre><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#C2603F;color:white;border:none;border-radius:10px;font-size:13px;cursor:pointer">إعادة المحاولة</button></div>';
});
ReactDOM.createRoot(document.getElementById("root")).render(h(Root,null));

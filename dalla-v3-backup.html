// ══ API LAYER ══════════════════════════════════════════
// ══════════════════════════════════════════════════════════
// ← ضع رابط Render هنا بعد النشر
// مثال: const PRODUCTION_API_URL = "https://dalla-backend-xxxx.onrender.com";
// إذا فعلت هذا وحفظت الملف، كل جهاز سيتصل بنفس السيرفر تلقائياً ✅
const PRODUCTION_API_URL = "";
// ══════════════════════════════════════════════════════════

const API_BASE = (()=>{
  // 1. الأولوية: قيمة مباشرة مضبوطة أعلاه
  if(PRODUCTION_API_URL) return PRODUCTION_API_URL.replace(/\/$/,"");
  // 2. إذا فُتح التطبيق عبر HTTP (من سيرفر) — استخدم نفس الأصل
  if(location.protocol==="https:" || (location.protocol==="http:" && location.hostname!=="localhost" && location.hostname!=="127.0.0.1"))
    return location.origin;
  // 3. تشغيل محلي على localhost — يتصل بالسيرفر المحلي
  return "http://localhost:4000";
})();

// تحذير مهم: إذا فُتح الملف بـ file:// أو كـ localhost
// البيانات لن تتزامن بين الأجهزة إلا إذا ضبطت PRODUCTION_API_URL
if(!PRODUCTION_API_URL && (location.protocol==="file:" || location.hostname==="localhost")){
  console.warn(
    "%c⚠️ دلّة: لمزامنة البيانات بين الأجهزة، اضبط PRODUCTION_API_URL في أعلى dalla-v3.html برابط Render الخاص بك",
    "color:orange;font-weight:bold;font-size:14px"
  );
}

let _apiOnline = null; // null = unknown yet, true/false after first check
let _authToken = localStorage.getItem('dalla_token') || null;
function setToken(t){ _authToken=t; if(t) localStorage.setItem('dalla_token',t); else localStorage.removeItem('dalla_token'); }
function getToken(){ return _authToken; }

async function api(method, path, body=null, requireAuth=true){
  try{
    const headers = { 'Content-Type':'application/json' };
    if(requireAuth && _authToken) headers['Authorization'] = 'Bearer '+_authToken;
    const opts = { method, headers };
    if(body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE+'/api'+path, opts);
    const data = await res.json();
    _apiOnline = true;
    if(!res.ok) throw new Error(data.error||'خطأ في السيرفر');
    return data;
  }catch(e){
    _apiOnline = false;
    console.warn('[API]', method, path, e.message);
    return null;
  }
}

async function checkApiHealth(){
  try{
    const res = await fetch(API_BASE+'/health');
    const data = await res.json();
    _apiOnline = res.ok && data.db === 'connected';
    return _apiOnline;
  }catch{
    _apiOnline = false;
    return false;
  }
}

const {createElement:h,useState,useEffect,useRef,useCallback,useMemo,createContext,useContext}=React;

// ══ STORE ENGINE ════════════════════════════════════════
function makeStore(init){
  let data=Array.isArray(init)?[...init]:{...init};
  const ls=[];
  function get(){return Array.isArray(init)?[...data]:{...data};}
  function set(v){data=v;ls.forEach(f=>f(get()));}
  function subscribe(fn){ls.push(fn);return()=>{const i=ls.indexOf(fn);if(i>-1)ls.splice(i,1);};}
  return{get,set,subscribe};
}
function makeHook(store){
  return function(){
    const[v,setV]=useState(store.get());
    useEffect(()=>store.subscribe(setV),[]);
    return v;
  };
}

// ══ باقات موحّدة: ١٥ كوب / ٣٠ كوب ══════════════════════
// السعر: أول شهر مخفّض ثم ينجدد تلقائياً
// avgCup = سعر الكوب العادي  wholesale = 0.7 × avgCup
// الشهر الأول مخفّض 20%، الشهر التالي سعر الجملة الكامل
function makePkgs(avgCup){
  const w=avgCup*0.7; // سعر الجملة لكل كوب
  const p15_1=Math.round(w*15*0.8*10)/10; // أول شهر
  const p15_r=Math.round(w*15*10)/10;       // تجديد
  const p30_1=Math.round(w*30*0.8*10)/10;
  const p30_r=Math.round(w*30*10)/10;
  return[
    {id:"pkg15",label:"١٥ كوب",cups:15,price1:p15_1,priceR:p15_r,
     desc:"أول شهر "+p15_1+" ر.ع ثم "+p15_r+" ر.ع / شهر",pop:false},
    {id:"pkg30",label:"٣٠ كوب",cups:30,price1:p30_1,priceR:p30_r,
     desc:"أول شهر "+p30_1+" ر.ع ثم "+p30_r+" ر.ع / شهر",pop:true},
  ];
}

let _cafesData=[];
;
const cafesLs=[];
// useCafes - wraps _cafesData array with reactivity, loads from server on first use
let _cafesStore=makeStore(_cafesData);
function useCafes(){
  const[v,setV]=useState(_cafesStore.get());
  useEffect(()=>{
    ensureCafesLoaded();
    return _cafesStore.subscribe(setV);
  },[]);

}

// ── مزامنة الكوفيهات مع السيرفر الحقيقي ──────────────────
async function loadCafesFromServer(){
  const r = await api("GET","/cafes",null,false);
  if(r && Array.isArray(r.cafes)){
    _cafesData = r.cafes;
    _cafesStore.set([..._cafesData]);
  }
}
// يُحمَّل عند فتح أي شاشة تستخدم الكوفيهات (انظر useCafes أدناه)
let _cafesLoadedOnce=false;
function ensureCafesLoaded(){
  if(_cafesLoadedOnce) return;
  _cafesLoadedOnce=true;
  loadCafesFromServer();
  loadCodesFromServer();   // أكواد الهدية والخصم
  loadOffersFromServer();  // العروض النشطة
}

async function updateCafe(id,updates){
  // تحديث متفائل فوري بالواجهة
  const i=_cafesData.findIndex(c=>c.id===id);
  if(i>-1){_cafesData[i]={..._cafesData[i],...updates};if(updates.avgCup)_cafesData[i].pkgs=makePkgs(updates.avgCup);_cafesStore.set([..._cafesData]);}
  // إرسال فعلي للسيرفر
  const r = await api("PATCH","/cafes/"+id,updates);
  if(r && r.cafe){
    const idx=_cafesData.findIndex(c=>c.id===id);
    if(idx>-1){_cafesData[idx]=r.cafe;_cafesStore.set([..._cafesData]);}
  }
}
async function addCafe(c){
  const r = await api("POST","/cafes",{
    slug:c.id, nameAr:c.nameAr, area:c.area, color:c.color, logo:c.logo,
    avgCup:c.avgCup, lat:c.lat, lng:c.lng, featured:c.featured
  });
  if(r && r.cafe){
    _cafesData.push(r.cafe);
  }else{
    // وضع عدم الاتصال: أضف محلياً فقط (لن يظهر عند المستخدمين الآخرين)
    _cafesData.push({...c,pkgs:makePkgs(c.avgCup||1.5)});
  }
  _cafesStore.set([..._cafesData]);
}
async function addMenuItem(cafeId,item){
  const r = await api("POST","/cafes/"+cafeId+"/menu",item);
  if(r && r.item){
    const cafe=_cafesData.find(c=>c.id===cafeId);
    if(cafe){
      cafe.menu=[...cafe.menu,{id:r.item.id,name:r.item.name,sizes:r.item.sizes,price:parseFloat(r.item.price)}];
      _cafesStore.set([..._cafesData]);
    }
    return true;
  }
  return false;
}
async function removeMenuItem(cafeId,itemId){
  const r = await api("DELETE","/cafes/"+cafeId+"/menu/"+itemId);
  if(r){
    const cafe=_cafesData.find(c=>c.id===cafeId);
    if(cafe){
      cafe.menu=cafe.menu.filter(m=>m.id!==itemId);
      _cafesStore.set([..._cafesData]);
    }
    return true;
  }
  return false;
}

// ══ GIFTS STORE ═══════════════════════════════════════════
const _gifts=makeStore([]);
const useGifts=makeHook(_gifts);
let gSeq=1;
function addGift(g){
  // subscription gifts: 7 days to activate. cup gifts: 5 days to use.
  const days=g.type==="pkg"?7:5;
  const gift={...g,id:gSeq++,createdAt:new Date().toISOString(),
    expiresAt:new Date(Date.now()+days*86400000).toISOString(),status:"pending"};
  _gifts.set([gift,..._gifts.get()]);
  return gift;
}
function getGifts(){return _gifts.get();}
function markGiftUsed(id){_gifts.set(_gifts.get().map(g=>g.id===id?{...g,status:"used"}:g));}
function getPendingGiftsFor(phoneOrUsername){
  const key=String(phoneOrUsername).replace(/\D/g,"").slice(-6);
  return _gifts.get().filter(g=>g.toPhone&&g.toPhone.replace(/\D/g,"").slice(-6)===key&&g.status==="pending"&&new Date(g.expiresAt)>new Date());
}

// ══ SUBSCRIPTIONS STORE (multi-subscription support) ═════
// username → array of subscription objects [{id,cafeId,cafeName,pkg,cups,totalCups,startDate,...}]
const _subs=makeStore({});
let subSeq=1;
function addSub(username,sub){
  const all=_subs.get();
  const list=all[username]||[];
  const withId={...sub,id:sub.id||("sub"+subSeq++),username,active:true};
  _subs.set({...all,[username]:[...list,withId]});
  return withId;
}
function setSub(username,sub){
  // backward-compat: replace/insert single subscription (used by legacy callers)
  addSub(username,sub);
}
function updateSubById(username,subId,updates){
  const all=_subs.get();
  const list=(all[username]||[]).map(s=>s.id===subId?{...s,...updates}:s);
  _subs.set({...all,[username]:list});
}
function removeSub(username,subId){
  const all=_subs.get();
  const list=(all[username]||[]).filter(s=>s.id!==subId);
  _subs.set({...all,[username]:list});
}
function getSubs(username){return _subs.get()[username]||[];}
function getActiveSubs(username){return getSubs(username).filter(s=>s.active!==false&&s.cups>0);}
function getSub(username){const list=getActiveSubs(username);return list[0]||null;} // legacy: first active sub
function useSub(username){
  const[val,setVal]=useState(()=>getSub(username));
  useEffect(()=>{
    const unsub=_subs.subscribe(all=>setVal((all[username]||[]).find(s=>s.active!==false&&s.cups>0)||null));
    return unsub;
  },[username]);
  return val;
}
function useSubs(username){
  const[val,setVal]=useState(()=>getSubs(username));
  useEffect(()=>{
    const unsub=_subs.subscribe(all=>setVal(all[username]||[]));
    return unsub;
  },[username]);
  return val;
}
const useAllSubs=makeHook(_subs);

// ══ GIFT ACTIVATION (subscription gifts pending activation) ═══
// Adds an active-7-days countdown; once activated → becomes a real subscription
function activateGiftSub(username,gift){
  const sub=addSub(username,{
    cafeId:gift.cafeId,cafeName:gift.cafe,pkg:gift.pkg,
    cups:gift.cups,totalCups:gift.cups,
    price1:0,priceR:0,startDate:new Date().toISOString(),
    fromGift:true,giftId:gift.id,
  });
  // mark gift as activated/consumed
  _gifts.set(_gifts.get().map(g=>g.id===gift.id?{...g,status:"activated"}:g));
  addSubscriber({username,cafeName:gift.cafe,cafeId:gift.cafeId,pkg:gift.pkg,cups:gift.cups,joinDate:new Date().toISOString()});
  return sub;
}

const useCodes=makeHook(_codes);
// ══ DISCOUNT CODES — API-BACKED ══════════════════════════

// كل عملية تذهب للسيرفر أولاً، ثم تُجلب بشكل دوري لتظهر عند الجميع

// يُجلب الكودات من السيرفر ويحدّث المخزن المحلي
async function loadCodesFromServer(){
  const r=await api("GET","/codes",null);
  if(r&&Array.isArray(r.codes)){
    const map={};
    r.codes.forEach(c=>{map[c.code]={pct:c.pct,uses:c.uses_limit,used:c.used_count,active:c.active,
      exp:c.expires_at,type:c.apply_to,isGift:c.is_gift,giftPhone:c.gift_phone};});
    _codes.set(map);
  }
}

async function addDiscountCode(code,pct,uses,exp,type,isGift,giftPhone){
  // أضف فوراً محلياً (optimistic UI)
  const k=code.toUpperCase().trim();
  const all=_codes.get();
  _codes.set({...all,[k]:{pct:parseInt(pct)||0,uses:parseInt(uses)||0,used:0,active:true,
    exp:exp||null,type:type||"both",isGift:!!isGift,giftPhone:giftPhone||null}});
  // أرسل للسيرفر
  const r=await api("POST","/codes",{code:k,pct,uses:uses||0,exp:exp||null,
    applyTo:type||"both",isGift:!!isGift,giftPhone:giftPhone||null});
  if(!r) console.warn("[sync] فشل حفظ الكود على السيرفر — محفوظ محلياً مؤقتاً");
  else await loadCodesFromServer(); // حدّث من السيرفر لضمان التطابق
}

async function toggleCode(code,active){
  const k=code.toUpperCase().trim();
  const all=_codes.get();
  if(all[k])_codes.set({...all,[k]:{...all[k],active}});
  await api("PATCH","/codes/"+k+"/toggle",null);
  await loadCodesFromServer();
}

function validateCode(code){
  const k=code?.toUpperCase()?.trim();
  const c=_codes.get()[k];
  if(!c||!c.active)return{ok:false,msg:"الكود غير صحيح أو غير نشط"};
  if(c.uses>0&&c.used>=c.uses)return{ok:false,msg:"انتهى عدد استخدامات هذا الكود"};
  if(c.exp&&new Date(c.exp)<new Date())return{ok:false,msg:"انتهت صلاحية الكود"};
  return{ok:true,pct:c.pct,isGift:c.isGift,giftPhone:c.giftPhone,
    msg:c.isGift?"كود هدية صالح ☕":"خصم "+c.pct+"%"};
}

async function useCode(code){
  const k=code?.toUpperCase()?.trim();
  const all=_codes.get();
  if(all[k])_codes.set({...all,[k]:{...all[k],used:(all[k].used||0)+1}});
  await api("POST","/codes/use",{code:k});
}

  _offers.set(_offers.get().filter(o=>o.id!==id));
  await api("DELETE","/offers/"+id,null);
}

function getActiveOffers(){
  const now=new Date();
  return _offers.get().filter(o=>o.active&&
    (!o.startAt||new Date(o.startAt)<=now)&&
    (!o.endAt||new Date(o.endAt)>=now));
}

// ══ ORDER FILTER HELPER (used by Admin "تصفية الطلبات") ═══
function filterOrders({orders,cafeId,drink,from,to}){
  return orders.filter(o=>{
    if(cafeId&&o.cafeId!==cafeId)return false;
    if(drink&&o.drink!==drink)return false;
    if(from||to){
      const d=new Date(o.createdAt).toLocaleDateString("en-CA");
      if(from&&d<from)return false;
      if(to&&d>to)return false;
    }
    return true;
  });
}

// ══ SECURE QR CODE ENGINE ═══════════════════════════════════
// Rotating, signed tokens — changes every render to prevent screenshot replay.
// Format: DALLA.<payloadBase64>.<signature>
let _qrSalt=Math.random().toString(36).slice(2);
function _qrSign(payload){
  // lightweight rotating hash (demo-grade signature, not cryptographic)
  let h=0;
  const s=payload+_qrSalt+todayStr();
  for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}
  return Math.abs(h).toString(36);
}
function generateSecureQR(identity){
  // identity: username/phone or gift code
  const nonce=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const payload=btoa(unescape(encodeURIComponent(identity+"|"+nonce))).replace(/=+$/,"");
  const sig=_qrSign(payload);
  return "DALLA."+payload+"."+sig;
}
function verifySecureQR(token){
  try{
    const parts=String(token).split(".");
    if(parts.length!==3||parts[0]!=="DALLA")return{valid:false,reason:"تنسيق غير صحيح"};
    const[,payload,sig]=parts;
    const expected=_qrSign(payload);
    if(sig!==expected)return{valid:false,reason:"الرمز غير صالح أو منتهي (أعد المسح)"};
    const decoded=decodeURIComponent(escape(atob(payload)));
    const identity=decoded.split("|")[0];
    return{valid:true,identity};
  }catch(e){return{valid:false,reason:"تعذّر قراءة الرمز"};}
}
// Rotate salt periodically so old screenshots of the QR stop working
setInterval(()=>{_qrSalt=Math.random().toString(36).slice(2);},45000);

// ══ TARGETED NOTIFICATIONS (per-user, not broadcast) ═══════
// userNotifs: phone/username → [{id,msg,type,time,read}]
const _userNotifs=makeStore({});
function addUserNotif(targetKey,msg,type="info",data=null){
  const all=_userNotifs.get();
  const key=String(targetKey).replace(/\D/g,"").slice(-8)||targetKey;
  const list=all[key]||[];
  const n={id:Date.now()+(Math.random()*999|0),msg,type,time:new Date(),data,read:false};
  _userNotifs.set({...all,[key]:[n,...list].slice(0,40)});
  return n.id;
}
function useUserNotifs(targetKey){
  const key=String(targetKey||"").replace(/\D/g,"").slice(-8)||targetKey;
  const[val,setVal]=useState(()=>(_userNotifs.get()[key]||[]));
  useEffect(()=>{
    const unsub=_userNotifs.subscribe(all=>setVal(all[key]||[]));
    return unsub;
  },[key]);
  return val;
}

// ══ PERIODIC CROSS-APP SYNC ═══════════════════════════════
// Re-broadcasts all stores every few minutes so every open app
// (admin/manager/barista/customer) reflects the latest data even
// if the change happened in a different tab/session via the API.
let _lastSync=Date.now();
function useSyncedNow(intervalMs=20000){ // كل 20 ثانية
  const[tick,setTick]=useState(0);
  useEffect(()=>{
    const t=setInterval(()=>{
      _lastSync=Date.now();
      // إعادة جلب فعلية من السيرفر — هذا ما يحل مشكلة عدم ظهور الإضافات الجديدة
      loadCafesFromServer();
      loadCodesFromServer();
      loadOffersFromServer();
      // باقي المخازن المحلية
      _orders.set(_orders.get());
      _notifs.set(_notifs.get());
      _complaints.set(_complaints.get());
      _gifts.set(_gifts.get());
      _subs.set(_subs.get());
      _subscribers.set(_subscribers.get());
      setTick(x=>x+1);
    },intervalMs);
    return()=>clearInterval(t);
  },[intervalMs]);
  return tick;
}

// ══ PULL-TO-REFRESH HOOK ═══════════════════════════════════
// Professional pull-down: whole page translates down while a spinner shows.
// No notification is sent to the user — purely visual.
function usePullToRefresh(onRefresh){
  const startY=useRef(0);const pulling=useRef(false);
  const[refreshing,setRefreshing]=useState(false);
  const[pullY,setPullY]=useState(0);
  const onTouchStart=e=>{if(window.scrollY===0){startY.current=e.touches[0].clientY;pulling.current=true;}};
  const onTouchMove=e=>{
    if(!pulling.current)return;
    const dy=e.touches[0].clientY-startY.current;
    if(dy>0&&window.scrollY===0){
      setPullY(Math.min(dy*0.5,70));
    }
  };
  const onTouchEnd=()=>{
    if(!pulling.current)return;
    pulling.current=false;
    if(pullY>40){
      setRefreshing(true);
      setPullY(70);
      setTimeout(()=>{
        if(onRefresh)onRefresh();
        setRefreshing(false);
        setPullY(0);
      },900);
    }else{
      setPullY(0);
    }
  };
  return{refreshing,pullY,handlers:{onTouchStart,onTouchMove,onTouchEnd}};
}

}

function QRDisplay({value,size=160,countdown=null}){
  const hash=value.split("").reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0)|0,0);
  const n=9;
  const cells=Array.from({length:n*n},(_,i)=>{
    const r=Math.floor(i/n),c=i%n;
    if((r<2&&c<2)||(r<2&&c>n-3)||(r>n-3&&c<2))return true;
    return((hash^(r*17+c*11+(r*c)))&1)===1;
  });
  const cs=Math.floor(size/n);
  const pct=countdown!=null?Math.round((countdown/30)*100):100;
  const circ=69.1; // 2π×11 ≈ dasharray
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8}},
    h("div",{style:{position:"relative",padding:8,background:"#FAF8F3",borderRadius:12,border:"2px solid #EDE8DC"}},
      h("div",{style:{display:"grid",gridTemplateColumns:`repeat(${n},${cs}px)`,gap:1}},
        ...cells.map((on,i)=>h("div",{key:i,style:{width:cs,height:cs,background:on?"#2C2416":"transparent",borderRadius:on?2:0}}))
      ),
      countdown!=null&&h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}},
        h("svg",{width:50,height:50,style:{opacity:.85}},
          h("circle",{cx:25,cy:25,r:22,fill:"none",stroke:"#EDE8DC",strokeWidth:3}),
          h("circle",{cx:25,cy:25,r:22,fill:"none",stroke:pct>40?"#4A7C5F":"#B85C3A",strokeWidth:3,
            strokeDasharray:"138.2",strokeDashoffset:138.2*(1-pct/100),
            strokeLinecap:"round",transform:"rotate(-90 25 25)",transition:"stroke-dashoffset .5s,stroke .5s"}),
          h("text",{x:25,y:30,textAnchor:"middle",fontSize:14,fontWeight:700,fill:"#2C2416"},countdown)
        )
      )
    )
  );
}

// ══ SIMPLE SVG CHART ══════════════════════════════════
function LineChart({data}){
  if(!data||!data.length)return null;
  const W=300,H=140,P=30;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=data.map((d,i)=>({x:P+(i/(data.length-1||1))*(W-P*2),y:P+(1-(d.v-mn)/rng)*(H-P*2),d}));
  const path=pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
  const fill=path+" L"+pts[pts.length-1].x+","+(H-P)+" L"+pts[0].x+","+(H-P)+" Z";
  return h("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height:H}},
    ...[0,1,2].map(i=>h("line",{key:i,x1:P,y1:P+i*(H-P*2)/2,x2:W-P,y2:P+i*(H-P*2)/2,stroke:"#EDE8DC",strokeWidth:1})),
    h("path",{d:fill,fill:"#B8974A15"}),
    h("path",{d:path,fill:"none",stroke:"#B8974A",strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"}),
    ...pts.map((p,i)=>h("g",{key:i},
      h("circle",{cx:p.x,cy:p.y,r:3.5,fill:"#B8974A",stroke:"#FAF8F3",strokeWidth:2}),
      h("text",{x:p.x,y:H-8,textAnchor:"middle",fontSize:9,fill:"#9C8E78"},p.d.month?.slice(0,3)||"")
    ))
  );
}

let _deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  _deferredInstallPrompt=e;
});
window.addEventListener('appinstalled',()=>{
  _deferredInstallPrompt=null;
});
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
}
function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function QRSheet({onClose,username,gift,subscription,subscriptionsList,onSubscribe,onPickSub}){
  const[timer,setTimer]=useState(30);
  const[codeInput,setCodeInput]=useState("");
  const[codeResult,setCodeResult]=useState(null);
  const[showCodeInput,setShowCodeInput]=useState(false);
  const lang=useLang();
  const subs=subscriptionsList||[];
  const sub=subscription||null;
  const cafe=sub?_cafesData.find(c=>c.id===sub.cafeId):null;
  const isMultiSub=!gift&&subs.length>1&&!sub&&!codeResult?.ok;

  // Countdown timer — only for an active subscription QR (not gifts, not multi-picker, not a redeemed code)
  useEffect(()=>{
    if(!sub||gift||isMultiSub||codeResult?.ok)return;
    if(timer<=0){onClose();return;}
    const t=setTimeout(()=>setTimer(tt=>tt-1),1000);
    return()=>clearTimeout(t);
  },[timer,sub,gift,isMultiSub,codeResult]);

  const applyCode=async()=>{
    const k=codeInput.trim().toUpperCase();
    if(!k){setCodeResult({ok:false,msg:"أدخل الكود"});return;}
    // أولاً: تحقق من السيرفر مباشرة لضمان رؤية الكودات الجديدة فوراً
    const serverResult=await api("POST","/codes/validate",{code:k});
    if(serverResult){
      if(serverResult.ok&&serverResult.isGift){
        // حدّث المخزن المحلي بهذا الكود
        const all=_codes.get();
        _codes.set({...all,[k]:{pct:100,uses:1,used:0,active:true,isGift:true}});
        setCodeResult({ok:true,isGift:true,code:k,msg:"✅ الكود صالح — اعرضه للباريستا"});
      } else if(serverResult.ok){
        setCodeResult({ok:false,msg:"هذا كود خصم، استخدمه عند الاشتراك وليس هنا"});
      } else {
        setCodeResult({ok:false,msg:serverResult.msg||"الكود غير صحيح"});
      }
      return;
    }
    // fallback: تحقق من المخزن المحلي (وضع عدم الاتصال)
    const r=validateCode(k);
    if(r.ok&&r.isGift){
      setCodeResult({ok:true,isGift:true,code:k,msg:"✅ الكود صالح — اعرضه للباريستا"});
    } else if(r.ok){
      setCodeResult({ok:false,msg:"هذا كود خصم، استخدمه عند الاشتراك وليس هنا"});
    } else {
      setCodeResult({ok:false,msg:r.msg});
    }
  };

  // Secure rotating QR value: gift > redeemed code > subscription
  const identity = gift ? ("GIFT-"+gift.id) : (codeResult?.ok&&codeResult.isGift ? codeResult.code : username);
  const qrValue = useMemo(()=>generateSecureQR(identity),[identity,timer]);

  // The code-entry box — shown for both subscribed and non-subscribed users
  const codeEntryBox = !gift&&!codeResult?.ok&&h("div",{style:{marginTop:14,paddingTop:14,borderTop:"1px solid #EDE8DC"}},
    !showCodeInput
      ?h("button",{onClick:()=>setShowCodeInput(true),
          style:{width:"100%",padding:"10px",borderRadius:12,background:"#F5F1E8",
            border:"1px solid #EDE8DC",fontSize:12,color:"#5C4F3A",fontWeight:700,
            display:"flex",alignItems:"center",justifyContent:"center",gap:6}},
          t("enter_code"))
      :h("div",null,
          h("p",{style:{fontSize:11,fontWeight:700,color:"#2C2416",marginBottom:7}},t("enter_code")),
          h("div",{style:{display:"flex",gap:7}},
            h("input",{value:codeInput,onChange:e=>setCodeInput(e.target.value.toUpperCase()),
              placeholder:"مثال: GIFT-ABC123",dir:"ltr",autoFocus:true,
              style:{flex:1,padding:"10px 12px",borderRadius:10,
                border:"1.5px solid "+(codeResult?.ok===false?"#B85C3A":"#EDE8DC"),
                background:"#FAF8F3",fontSize:13,color:"#2C2416",outline:"none"},
              onKeyDown:e=>e.key==="Enter"&&applyCode()}),
            h("button",{onClick:applyCode,
              style:{padding:"10px 14px",borderRadius:10,fontWeight:700,fontSize:12,
                background:"linear-gradient(135deg,#B8974A,#D4AF6A)",color:"#FAF8F3"}},
              t("check"))
          ),
          codeResult&&h("p",{style:{fontSize:11,marginTop:5,fontWeight:700,
            color:codeResult.ok?"#4A7C5F":"#B85C3A"}},codeResult.msg),
          h("button",{onClick:()=>{setShowCodeInput(false);setCodeResult(null);setCodeInput("");},
            style:{fontSize:11,color:"#9C8E78",background:"none",marginTop:5}},t("cancel"))
        )
  );

  return h("div",{className:"overlay",onClick:onClose},
    h("div",{className:"sheet",style:{padding:20},onClick:e=>e.stopPropagation()},

      // ── Case: a code was entered and validated — show its QR ──
      codeResult?.ok&&h("div",{style:{textAlign:"center"}},
        h("p",{style:{fontWeight:700,fontSize:14,color:"#4A7C5F",marginBottom:4}},"🎁 "+t("redeem_qr_title")),
        h("p",{style:{fontSize:11,color:"#9C8E78",marginBottom:12}},t("show_to_barista")),
        h(QRDisplay,{value:qrValue,countdown:null}),
        h("p",{style:{fontSize:10,color:"#9C8E78",marginTop:6,direction:"ltr",letterSpacing:1}},codeResult.code),
        h("button",{onClick:()=>{setCodeResult(null);setCodeInput("");setShowCodeInput(false);},
          style:{marginTop:10,padding:"6px 16px",borderRadius:10,background:"#EDE8DC",color:"#9C8E78",fontSize:12}},
          "← "+t("back"))
      ),

      // ── Case: multiple active subscriptions — let user pick ──
      isMultiSub&&h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontSize:36,marginBottom:8}},"📦"),
        h("p",{style:{fontWeight:700,fontSize:15,color:"#2C2416",marginBottom:4}},t("which_sub")),
        h("p",{style:{fontSize:12,color:"#9C8E78",marginBottom:14}},t("multi_sub_hint")),
        h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          ...subs.map(s=>{
            const c=_cafesData.find(cc=>cc.id===s.cafeId);
            return h("button",{key:s.id,onClick:()=>onPickSub&&onPickSub(s),
              style:{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",
                borderRadius:14,background:"#FDFAF6",border:"1.5px solid "+(c?c.color:"#EDE8DC"),
                textAlign:"start"}},
              c&&h(CafeLogo,{cafe:c,size:36}),
              h("div",{style:{flex:1}},
                h("p",{style:{fontWeight:700,fontSize:13,color:"#2C2416"}},(c?c.nameAr:s.cafeName)+" · "+s.pkg),
                h("p",{style:{fontSize:11,color:c?c.color:"#B8974A",fontWeight:700}},s.cups+" "+t("cups_remaining"))
              ),
              h("span",{style:{color:"#9C8E78",fontSize:16}},"›")
            );
          })
        ),
        codeEntryBox
      ),

      // ── Case: cup gift — QR only + WhatsApp help + timer, no code box ──
      gift&&gift.type==="cup"&&h("div",{style:{textAlign:"center"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
          background:"linear-gradient(135deg,#B8974A15,#D4AF6A08)",
          border:"1px solid #B8974A33",borderRadius:14,marginBottom:12,textAlign:"start"}},
          h("span",{style:{fontSize:26}},"🎁"),
          h("div",{style:{flex:1}},
            h("p",{style:{fontWeight:700,fontSize:13,color:"#2C2416"}},gift.cafe||""),
            h("p",{style:{fontSize:11,color:"#B8974A",fontWeight:700}},(gift.drink||t("gift_cup"))+(gift.size?" ("+gift.size+")":""))
          )
        ),
        h("p",{style:{fontWeight:700,fontSize:14,color:"#2C2416",marginBottom:4}},t("gift_qr_title")),
        h("p",{style:{fontSize:11,color:"#9C8E78",marginBottom:12}},t("show_to_barista")),
        h(QRDisplay,{value:qrValue,countdown:timer}),
        h("p",{style:{fontSize:11,color:timer>10?"#4A7C5F":"#B85C3A",marginTop:8,fontWeight:700}},
          timer>0?"يتجدد الرمز خلال "+timer+" ثانية":"يتجدد الرمز..."),
        h("div",{style:{marginTop:14,paddingTop:14,borderTop:"1px solid #EDE8DC",textAlign:"center"}},
          h("p",{style:{fontSize:12,color:"#9C8E78",marginBottom:6}},t("need_help")),
          h("a",{href:"https://wa.me/"+SUPPORT_WHATSAPP,target:"_blank",
            style:{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 16px",
              borderRadius:10,background:"#25D366",color:"#FAF8F3",fontSize:11,fontWeight:700,
              textDecoration:"none"}},"💬 "+t("whatsapp_help"))
        )
      ),

      // ── Case: subscription gift (not yet activated) — show activate option ──
      gift&&gift.type==="pkg"&&gift.status==="pending"&&h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontSize:44,marginBottom:8}},"🎁"),
        h("p",{style:{fontWeight:700,fontSize:15,color:"#2C2416",marginBottom:4}},lang==="ar"?"هدية اشتراك بانتظارك!":"A subscription gift awaits you!"),
        h("p",{style:{fontSize:12,color:"#9C8E78",marginBottom:4}},(gift.cafe||"")+" · "+(gift.pkg||"")),
        h("p",{style:{fontSize:11,color:"#B85C3A",marginBottom:16}},
          t("expires_in_days",Math.max(0,Math.ceil((new Date(gift.expiresAt)-new Date())/86400000)))+(lang==="ar"?" — فعّلها الآن":" — activate now")),
        h("button",{onClick:()=>{if(onSubscribe)onSubscribe(gift);},
          style:{width:"100%",padding:14,borderRadius:14,fontWeight:700,fontSize:14,
            background:"linear-gradient(135deg,#4A7C5F,#6FA882)",color:"#FAF8F3"}},
          t("activate_sub"))
      ),

      // ── Case: not subscribed, no gift, no code redeemed ──
      !sub&&!gift&&!isMultiSub&&!codeResult?.ok&&h("div",{style:{textAlign:"center",paddingBottom:8}},
        h("div",{style:{fontSize:44,marginBottom:8}},"☕"),
        h("p",{style:{fontWeight:700,fontSize:15,color:"#2C2416",marginBottom:4}},t("new_order")),
        h("p",{style:{fontSize:12,color:"#9C8E78",marginBottom:16,lineHeight:1.6}},
          t("subscribe_or_code")),
        h("button",{onClick:()=>{if(onSubscribe)onSubscribe();else onClose();},
          style:{width:"100%",padding:13,borderRadius:14,fontWeight:700,fontSize:13,
            background:"linear-gradient(135deg,#B8974A,#D4AF6A)",color:"#FAF8F3",marginBottom:8}},
          t("subscribe_now")+" 📦"),
        codeEntryBox
      ),

      // ── Case: subscribed — show QR (single active sub) ──
      sub&&!gift&&!isMultiSub&&!codeResult?.ok&&h("div",{style:{textAlign:"center"}},
        cafe&&h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
          background:"linear-gradient(135deg,"+cafe.color+"15,"+cafe.color+"08)",
          border:"1px solid "+cafe.color+"33",borderRadius:14,marginBottom:12,textAlign:"start"}},
          h(CafeLogo,{cafe,size:34}),
          h("div",{style:{flex:1}},
            h("p",{style:{fontWeight:700,fontSize:13,color:"#2C2416"}},cafe.nameAr+" · "+sub.pkg),
            h("p",{style:{fontSize:11,color:cafe.color,fontWeight:700}},sub.cups+" "+t("cups_remaining"))
          ),
          subs.length>1&&h("button",{onClick:()=>onPickSub&&onPickSub(null),
            style:{fontSize:11,color:cafe.color,fontWeight:700,background:"none"}},t("change"))
        ),
        h("p",{style:{fontWeight:700,fontSize:14,color:"#2C2416",marginBottom:4}},t("daily_qr")),
        h("p",{style:{fontSize:11,color:"#9C8E78",marginBottom:12}},t("show_to_barista")),
        h(QRDisplay,{value:qrValue,countdown:timer}),
        h("p",{style:{fontSize:11,color:timer>10?"#4A7C5F":"#B85C3A",marginTop:8,fontWeight:700}},
          timer>0?t("expires_in_sec",timer):t("expired")),
        codeEntryBox,
        h("div",{style:{marginTop:14,paddingTop:14,borderTop:"1px solid #EDE8DC",textAlign:"center"}},
          h("p",{style:{fontSize:12,color:"#9C8E78",marginBottom:6}},"هل تحتاج مساعدة؟"),
          h("a",{href:"https://wa.me/"+SUPPORT_WHATSAPP,target:"_blank",
            style:{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 16px",
              borderRadius:10,background:"#25D366",color:"#FAF8F3",fontSize:11,fontWeight:700,
              textDecoration:"none"}},"💬 مساعدة عبر واتساب")
        )
      )
    )
  );
}

function ComplaintForm({onClose,username}){

// ══ PACKAGE PAYMENT SECTION (with discount code) ════════
function PkgPaymentSection({pkg,cafe,onSuccess}){
  const[code,setCode]=useState("");
  const[disc,setDisc]=useState(null);
  const[err,setErr]=useState("");
  useOffers(); // re-render when admin adds/removes offers

  // Auto-detect best active offer applicable to subscriptions for this café (or all cafés)
  const activeOffer=useMemo(()=>{
    const offers=getActiveOffers().filter(o=>(o.applyTo==="subscription"||o.applyTo==="both")&&(!o.cafeId||o.cafeId===cafe.id));
    if(!offers.length)return null;
    return offers.reduce((best,o)=>(!best||o.pct>best.pct)?o:best,null);
  },[cafe.id]);

  const manualPct=disc?disc.pct:0;
  const offerPct=activeOffer?activeOffer.pct:0;
  const bestPct=Math.max(manualPct,offerPct);
  const usingOffer=bestPct===offerPct&&offerPct>0&&offerPct>=manualPct;
  const price=bestPct>0?Math.round(pkg.price1*(1-bestPct/100)*100)/100:pkg.price1;

  const applyCode=async()=>{
    const serverResult=await api("POST","/codes/validate",{code:code});
    if(serverResult){
      if(serverResult.ok&&!serverResult.isGift){setDisc({pct:serverResult.pct,msg:"خصم "+serverResult.pct+"%"});setErr("");}
      else if(serverResult.isGift){setErr("هذا كود هدية، استخدمه من زر طلب جديد وليس هنا");}
      else{setErr(serverResult.msg||"الكود غير صحيح");setDisc(null);}
      return;
    }
    const r=validateCode(code);
    if(r.ok){setDisc(r);setErr("");}
    else{setErr(r.msg);setDisc(null);}
  };

  return h("div",{style:{marginTop:14}},
    // Active offer banner (auto-applied, no code needed)
    activeOffer&&h("div",{style:{background:"#FFFBF3",border:"1.5px solid #B8974A44",borderRadius:12,padding:"10px 12px",marginBottom:12}},
      h("p",{style:{fontSize:12,fontWeight:700,color:"#B8974A"}},"🎁 "+activeOffer.title+" — خصم "+activeOffer.pct+"% مُطبَّق تلقائياً")
    ),
    // Discount code
    h("div",{style:{marginBottom:12}},
      h("p",{style:{fontSize:11,fontWeight:700,color:"#5C4F3A",marginBottom:6}},"كود خصم إضافي (اختياري)"),
      h("div",{style:{display:"flex",gap:7}},
        h("input",{value:code,onChange:e=>setCode(e.target.value.toUpperCase()),
          placeholder:"مثال: DALLA10",dir:"ltr",
          style:{flex:1,background:"#FAF8F3",border:"1.5px solid "+(disc?"#4A7C5F":err?"#B85C3A":"#EDE8DC"),
            borderRadius:10,padding:"9px 12px",fontSize:12,color:"#2C2416",outline:"none"}}),
        h("button",{onClick:applyCode,style:{padding:"9px 14px",borderRadius:10,
          background:cafe.color,color:"#FAF8F3",fontWeight:700,fontSize:12}},"تطبيق")
      ),
      disc&&h("p",{style:{fontSize:11,color:"#4A7C5F",marginTop:4,fontWeight:700}},"✓ "+disc.msg+" — خصم "+disc.pct+"%"),
      err&&h("p",{style:{fontSize:11,color:"#B85C3A",marginTop:4}},err),
      disc&&activeOffer&&h("p",{style:{fontSize:10,color:"#9C8E78",marginTop:4}},usingOffer?"تم اختيار خصم العرض لأنه أكبر":"تم اختيار خصم الكود لأنه أكبر")
    ),
    // Price summary
    h("div",{style:{background:cafe.color+"12",borderRadius:12,padding:"10px 14px",marginBottom:12}},
      bestPct>0&&h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#9C8E78",marginBottom:4}},
        h("span",null,"السعر الأصلي"),
        h("span",{style:{textDecoration:"line-through"}},pkg.price1+" ر.ع")
      ),
      bestPct>0&&h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#4A7C5F",fontWeight:700,marginBottom:4}},
        h("span",null,"الخصم ("+bestPct+"%)"),
        h("span",null,"− "+((pkg.price1-price).toFixed(3))+" ر.ع")
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,color:"#2C2416"}},
        h("span",null,"المجموع"),
        h("span",{style:{color:cafe.color,fontFamily:"Georgia,serif",fontSize:18}},price.toFixed(3)+" ر.ع")
      )
    ),
    // Subscribe button
    h("button",{
      onClick:()=>{
        if(disc&&!usingOffer)useCode(code);
        onSuccess({id:pkg.id,label:pkg.label,cups:pkg.cups,price1:price,priceR:pkg.priceR,finalPrice:price,pop:pkg.pop});
      },
      style:{width:"100%",padding:15,borderRadius:16,fontWeight:700,fontSize:14,
        background:"linear-gradient(135deg,"+cafe.color+","+cafe.color+"cc)",color:"#FAF8F3",
        boxShadow:"0 4px 12px "+cafe.color+"44"}
    },"اشترك الآن — "+price.toFixed(3)+" ر.ع الشهر الأول")
  );
}

function BaristaApp(){
  const{username,handleLogout,staffCafeId}=useApp();

  const cafe=cafes.find(c=>c.id===staffCafeId)||cafes[0];
  const[bTab,setBTab]=useState("orders");
  const[filter,setFilter]=useState("active");
  const[scanCode,setScanCode]=useState("");
  const[scanPhase,setScanPhase]=useState("input");
  const[scanUser,setScanUser]=useState(null);
  const[selectedDrink,setSelectedDrink]=useState(null);
  const[selectedSize,setSelectedSize]=useState("");
  const[scanOk,setScanOk]=useState(null);
  const[cameraOn,setCameraOn]=useState(false);
  const[toast,setToast]=useState({show:false,msg:""});
  const orders=useOrders();
  const lang=useLang();
  const videoRef=useRef(null);const streamRef=useRef(null);
  const showToast=m=>{setToast({show:true,msg:m});setTimeout(()=>setToast({show:false,msg:""}),2200);};

  const todayOrders=useMemo(()=>{
    const now=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Muscat"}));
    const base=new Date(now);base.setHours(6,0,0,0);
    if(now.getHours()<6)base.setDate(base.getDate()-1);
    const end=new Date(base);end.setDate(end.getDate()+1);
    return orders.filter(o=>{const d=new Date(o.createdAt);return d>=base&&d<end;});
  },[orders]);

  const activeOrds=todayOrders.filter(o=>["pending","preparing"].includes(o.status));
  const readyOrds=todayOrders.filter(o=>o.status==="ready");
  const doneOrds=todayOrders.filter(o=>["completed","cancelled"].includes(o.status));
  const shown=filter==="active"?[...activeOrds,...readyOrds]:doneOrds;

  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});streamRef.current=s;if(videoRef.current)videoRef.current.srcObject=s;setCameraOn(true);}catch{showToast(lang==="ar"?"تعذّر فتح الكاميرا":"Could not open camera");}};
  const stopCam=()=>{if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;setCameraOn(false);};
  useEffect(()=>()=>stopCam(),[]);

  const resetScan=()=>{setScanCode("");setScanUser(null);setScanPhase("input");setSelectedDrink(null);setSelectedSize("");setScanOk(null);stopCam();};

  const doValidate=useCallback(rawCode=>{
    if(!rawCode.trim()){setScanOk({ok:false,msg:"الرمز فارغ"});setScanPhase("result");return;}
    // Try secure rotating QR first (format DALLA.payload.sig)
    let k=rawCode.trim().toUpperCase();
    if(rawCode.trim().startsWith("DALLA.")){
      const v=verifySecureQR(rawCode.trim());
      if(!v.valid){setScanOk({ok:false,msg:v.reason});setScanPhase("result");return;}
      k=v.identity.toUpperCase();
    }
    // Check if it's a gift code (GIFT-XXXXXX from admin) OR a cup-gift identity (GIFT-<numericId> from QRSheet)
    if(k.startsWith("GIFT-")){
      const giftIdPart=k.slice(5);
      // Case 1: numeric id → this is a cup gift created via GiftForm, scanned through QRSheet
      if(/^\d+$/.test(giftIdPart)){
        const cupGift=_gifts.get().find(g=>String(g.id)===giftIdPart&&g.type==="cup");
        if(!cupGift){setScanOk({ok:false,msg:"الهدية غير موجودة"});setScanPhase("result");return;}
        if(cupGift.status!=="pending"){setScanOk({ok:false,msg:"تم استخدام هذه الهدية مسبقاً"});setScanPhase("result");return;}
        if(new Date(cupGift.expiresAt)<new Date()){setScanOk({ok:false,msg:"انتهت صلاحية الهدية"});setScanPhase("result");return;}
        setScanOk({ok:true,msg:"✓ هدية قهوة صالحة",name:cupGift.toName||"عميل",cups:1,key:k,isGift:true,giftRecordId:cupGift.id});

        setScanPhase("result");

        return;
      }
      // Case 2: admin-issued discount-style gift code
      const gc=_codes.get()[k];
      if(!gc||!gc.isGift){setScanOk({ok:false,msg:"كود الهدية غير صحيح"});setScanPhase("result");return;}
      if(!gc.active||gc.used>=1){setScanOk({ok:false,msg:"كود الهدية مستخدم أو منتهي"});setScanPhase("result");return;}

    }
    const sub=FALLBACK_SUBS[k];

    if(sub.cups<=0){setScanOk({ok:false,msg:"انتهت الأكواب لهذا الشهر"});setScanPhase("result");return;}
    if(dailyUsage[k]===todayStr()){setScanOk({ok:false,msg:"تم استخدام الكوب اليومي — يتجدد منتصف الليل"});setScanPhase("result");return;}

      "لا توجد بيانات مشتركين بعد لعرض توزيع الأعمار");

}

        ...[{label:"إجمالي الإيرادات",v:totalRev+" ر.ع",e:"💰"},{label:"أكواب مكتملة",v:orders.filter(o=>o.status==="completed").length,e:"☕"},{label:"مشتركون نشطون",v:realSubscribers.length,e:"👥"},{label:"عروض نشطة",v:getActiveOffers().length,e:"🎁"},{label:"أكواد خصم نشطة",v:Object.values(allCodes).filter(c=>c.active).length,e:"🏷️"},{label:"شكاوي مفتوحة",v:complaints.filter(c=>c.status==="open").length,e:"📋"}].map(r=>
          h("div",{key:r.label,style:{...BOX,display:"flex",alignItems:"center",gap:10}},
            h("span",{style:{fontSize:20}},r.e),
            h("div",{style:{flex:1}},h("p",{style:{fontSize:11,color:"#9C8E78"}},r.label),h("p",{style:{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:"#2C2416"}},r.v))
          )
        ),
        h("button",{onClick:exportCSV,style:{width:"100%",marginTop:6,padding:14,borderRadius:14,fontWeight:700,fontSize:13,background:"linear-gradient(135deg,#B8974A,#D4AF6A)",color:"#FAF8F3",display:"flex",alignItems:"center",justifyContent:"center",gap:7}},"📥 تصدير CSV")
      )
    )
  );
}

// ══ ROOT ═══════════════════════════════════════════════
function Root(){
  const[role,setRole]=useState(null);
  const[username,setUsername]=useState("");
  const[staffCafeId,setStaffCafeId]=useState(null);
  const handleLogin=(r,u,cafeId=null,tok=null)=>{if(tok)setToken(tok);setRole(r);setUsername(u||"زائر");setStaffCafeId(cafeId);};
  const handleLogout=()=>{setToken(null);setRole(null);setUsername("");setStaffCafeId(null);};
  const ctx={username,handleLogout,staffCafeId};
  return h(Ctx.Provider,{value:ctx},
    !role?h(Gateway,{onLogin:handleLogin}):
    role==="customer"?h(CustomerApp,null):
    role==="barista"?h(BaristaApp,null):
    role==="manager"?h(ManagerApp,null):
    h(AdminApp,null)
  );
}

// Error boundary - shows error instead of blank screen
window.addEventListener('error',function(e){
  var r=document.getElementById('root');
  if(r)r.innerHTML='<div style="padding:24px;font-family:Arial;direction:rtl;max-width:430px;margin:0 auto;text-align:center"><div style="font-size:40px;margin-bottom:12px">⚠️</div><p style="font-weight:700;font-size:16px;color:#B85C3A;margin-bottom:8px">خطأ في التطبيق</p><pre style="font-size:11px;color:#666;direction:ltr;word-break:break-all;white-space:pre-wrap;text-align:start;background:#f5f5f5;padding:10px;border-radius:8px">'+(e.message||'?')+'\n'+(e.filename||'')+':'+(e.lineno||'')+'</pre><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#B8974A;color:white;border:none;border-radius:10px;font-size:13px;cursor:pointer">إعادة المحاولة</button></div>';
});
ReactDOM.createRoot(document.getElementById("root")).render(h(Root,null));

// ══ PWA: تسجيل الـ Service Worker ═══════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(e=>console.warn('SW failed:',e.message));
  });
}
</script>
